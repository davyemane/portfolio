# Configuration nginx pour le VPS
# Ce fichier doit être copié dans /etc/nginx/sites-available/
# puis créer un lien symbolique dans /etc/nginx/sites-enabled/
# Commandes:
# sudo cp nginx-vps.conf /etc/nginx/sites-available/portfolio
# sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
# sudo nginx -t
# sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Logs
    access_log /var/log/nginx/portfolio-access.log;
    error_log /var/log/nginx/portfolio-error.log;

    # Redirect HTTP to HTTPS (à activer après avoir configuré SSL)
    # return 301 https://$server_name$request_uri;

    # Reverse proxy vers le container Docker
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # Headers pour le proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (si nécessaire)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Limite de taille des uploads
    client_max_body_size 10M;
}

